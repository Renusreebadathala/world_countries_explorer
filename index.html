<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World Countries Explorer</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --card: #1a1a24;
    --border: #2a2a3a;
    --accent: #e8b86d;
    --accent2: #7eb8d4;
    --text: #e8e8f0;
    --muted: #888899;
    --tag-bg: #1e1e2e;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }
  header {
    background: linear-gradient(135deg, #0d0d18 0%, #1a1020 50%, #0d1520 100%);
    padding: 60px 20px 40px;
    text-align: center;
    border-bottom: 1px solid var(--border);
    position: relative;
    overflow: hidden;
  }
  header::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at 50% 0%, rgba(232,184,109,0.12) 0%, transparent 70%);
    pointer-events: none;
  }
  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2.2rem, 5vw, 4rem);
    font-weight: 900;
    background: linear-gradient(135deg, var(--accent) 0%, #f5d08a 50%, var(--accent2) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 10px;
  }
  header p {
    color: var(--muted);
    font-size: 1.05rem;
    letter-spacing: 0.05em;
    margin-bottom: 30px;
  }
  .stats {
    display: inline-flex; gap: 30px;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 50px;
    padding: 10px 24px;
    font-size: 0.85rem;
    color: var(--muted);
  }
  .stats span { color: var(--accent); font-weight: 600; }
  .controls {
    background: var(--surface);
    padding: 20px;
    border-bottom: 1px solid var(--border);
    display: flex; flex-wrap: wrap; gap: 12px;
    align-items: center; justify-content: center;
    position: sticky; top: 0; z-index: 100;
    backdrop-filter: blur(10px);
  }
  .search-wrap {
    position: relative; flex: 1; min-width: 220px; max-width: 380px;
  }
  .search-wrap input {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 16px 10px 40px;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-wrap input:focus { border-color: var(--accent); }
  .search-wrap::before {
    content: '🔍';
    position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
    font-size: 0.85rem;
  }
  .region-filters { display: flex; flex-wrap: wrap; gap: 8px; }
  .filter-btn {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 7px 14px;
    border-radius: 20px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.82rem;
    transition: all 0.2s;
  }
  .filter-btn:hover, .filter-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #0a0a0f;
    font-weight: 600;
  }
  .count-bar {
    text-align: center;
    padding: 14px;
    color: var(--muted);
    font-size: 0.85rem;
    border-bottom: 1px solid var(--border);
  }
  .count-bar span { color: var(--accent); font-weight: 600; }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 18px;
    padding: 24px;
    max-width: 1600px;
    margin: 0 auto;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    transition: transform 0.25s, border-color 0.25s, box-shadow 0.25s;
    cursor: pointer;
    animation: fadeIn 0.4s ease;
  }
  @keyframes fadeIn { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:none; } }
  .card:hover {
    transform: translateY(-4px);
    border-color: var(--accent);
    box-shadow: 0 12px 40px rgba(232,184,109,0.12);
  }
  .card-header {
    padding: 18px 20px 14px;
    display: flex; align-items: center; gap: 14px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(135deg, rgba(255,255,255,0.03) 0%, transparent 100%);
  }
  .flag { font-size: 2.4rem; line-height: 1; }
  .country-title h2 {
    font-family: 'Playfair Display', serif;
    font-size: 1.2rem;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 3px;
  }
  .country-title .region-tag {
    font-size: 0.72rem;
    background: var(--tag-bg);
    border: 1px solid var(--border);
    color: var(--accent2);
    padding: 2px 8px;
    border-radius: 10px;
    display: inline-block;
    letter-spacing: 0.04em;
  }
  .card-body { padding: 16px 20px; }
  .info-row {
    display: flex; gap: 8px; align-items: flex-start;
    margin-bottom: 10px;
    font-size: 0.88rem;
  }
  .info-row .label {
    color: var(--muted);
    min-width: 78px;
    font-size: 0.78rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    padding-top: 1px;
  }
  .info-row .value { color: var(--text); line-height: 1.5; }
  .info-row .icon { font-size: 1rem; margin-right: 4px; }
  .card-footer {
    padding: 12px 20px;
    border-top: 1px solid var(--border);
    display: flex; gap: 8px; flex-wrap: wrap;
  }
  .tag {
    background: rgba(232,184,109,0.08);
    border: 1px solid rgba(232,184,109,0.2);
    color: var(--accent);
    padding: 3px 10px;
    border-radius: 12px;
    font-size: 0.75rem;
  }
  .hidden { display: none !important; }
  footer {
    text-align: center;
    padding: 30px;
    color: var(--muted);
    font-size: 0.82rem;
    border-top: 1px solid var(--border);
    margin-top: 20px;
  }
  @media(max-width:600px) {
    .grid { grid-template-columns: 1fr; padding: 12px; }
    .controls { padding: 12px; }
  }
</style>
</head>
<body>

<header>
  <h1>🌍 World Countries Explorer</h1>

  <div class="stats">

</header>

<div class="controls">
  <div class="search-wrap">

  <div class="region-filters">

    <button class="filter-btn" onclick="setRegion('Asia', this)">🌏 Asia</button>
    <button class="filter-btn" onclick="setRegion('Europe', this)">🌍 Europe</button>
    <button class="filter-btn" onclick="setRegion('Americas', this)">🌎 Americas</button>

  </div>
</div>

<div class="count-bar">Showing <span id="visibleCount">195</span> of 195 countries</div>

<div class="grid" id="grid"></div>

<footer>🌐 World Countries Explorer — All 195 UN-recognized countries &nbsp;|&nbsp; Data curated for educational purposes</footer>

let currentRegion = 'All';

function buildCard(c) {
  return `<div class="card" data-region="${c.region}" data-name="${c.name.toLowerCase()}">
    <div class="card-header">
      <div class="flag">${c.flag}</div>
      <div class="country-title">
        <h2>${c.name}</h2>
        <span class="region-tag">${c.region}</span>
      </div>
    </div>
    <div class="card-body">
      <div class="info-row"><span class="label">🏛 Capital</span><span class="value">${c.capital}</span></div>
      <div class="info-row"><span class="label">🗣 Language</span><span class="value">${c.language}</span></div>
      <div class="info-row"><span class="label">💰 Currency</span><span class="value">${c.currency}</span></div>
      <div class="info-row"><span class="label">🗺 Attractions</span><span class="value">${c.attractions}</span></div>
      <div class="info-row"><span class="label">🍽 Food</span><span class="value">${c.food}</span></div>
    </div>
    <div class="card-footer">${c.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>
  </div>`;
}

function renderAll() {
  document.getElementById('grid').innerHTML = countries.map(buildCard).join('');
  updateCount();
}

function setRegion(region, btn) {
  currentRegion = region;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  filterCards();
}

function filterCards() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  let visible = 0;
  document.querySelectorAll('.card').forEach(card => {
    const name = card.dataset.name;
    const region = card.dataset.region;
    const text = card.innerText.toLowerCase();
    const matchRegion = currentRegion === 'All' || region === currentRegion;
    const matchSearch = !search || text.includes(search);
    if (matchRegion && matchSearch) {
      card.classList.remove('hidden');
      visible++;
    } else {
      card.classList.add('hidden');
    }
  });
  document.getElementById('visibleCount').textContent = visible;
}

function updateCount() {
  document.getElementById('visibleCount').textContent = countries.length;
}

renderAll();
</script>
